<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRN Detection Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #6366f1;
    }
    .subtitle {
      color: #9ca3af;
      margin-bottom: 40px;
    }
    .test-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #818cf8;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #d1d5db;
      font-size: 14px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-family: 'Courier New', monospace;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6366f1;
    }
    button {
      background: #6366f1;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #4f46e5;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
    }
    .result.success {
      background: rgba(34, 197, 94, 0.1);
      border: 2px solid #22c55e;
      color: #4ade80;
    }
    .result.error {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid #ef4444;
      color: #f87171;
    }
    .test-case {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 4px solid #6366f1;
    }
    .test-input {
      color: #9ca3af;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .test-output {
      color: #4ade80;
      font-weight: 600;
      font-size: 16px;
    }
    .test-output.fail {
      color: #f87171;
    }
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .stat {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .stat-label {
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MRN Detection Test Suite</h1>
    <p class="subtitle">Validate MRN normalization and detection logic</p>

    <div class="test-section">
      <h2>Interactive Test</h2>
      <div class="input-group">
        <label for="testInput">Enter speech-to-text variation:</label>
        <input type="text" id="testInput" placeholder='e.g., "MRN AB123" or "M R N dash AB123"'>
      </div>
      <button onclick="testSingle()">Test Detection</button>
      <div id="singleResult"></div>
    </div>

    <div class="test-section">
      <h2>Batch Test - All Variations</h2>
      <button onclick="runAllTests()">Run All Tests</button>
      <div id="batchResults"></div>
      <div class="stats" id="stats" style="display:none;">
        <div class="stat">
          <div class="stat-value" id="totalTests">0</div>
          <div class="stat-label">Total Tests</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="passedTests" style="color: #4ade80;">0</div>
          <div class="stat-label">Passed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="failedTests" style="color: #f87171;">0</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>
    </div>

    <div class="test-section">
      <h2>Continuous Transcript Test</h2>
      <div class="input-group">
        <label for="transcriptInput">Enter multi-line transcript (one phrase per line):</label>
        <textarea id="transcriptInput" placeholder="Patient presenting with fever
MRN AB123
Chief complaint is headache"></textarea>
      </div>
      <button onclick="testTranscript()">Scan Transcript</button>
      <div id="transcriptResult"></div>
    </div>
  </div>

  <script>
    function normalizeMRN(rawInput) {
      if (!rawInput || typeof rawInput !== 'string') return null;

      let normalized = rawInput
        .trim()
        .toUpperCase()
        .replace(/\s+/g, ' ')
        .replace(/\s*-\s*/g, '-');

      normalized = normalized
        .replace(/\bDASH\b/gi, '-')
        .replace(/\bHYPHEN\b/gi, '-');

      const excludeWords = /^(NUMBER|IS|MRN|PATIENT|ID|MEDICAL|RECORD|THE|A|AN)$/i;

      const patterns = [
        /\bM\s*R\s*N\s*-\s*([A-Z0-9]{3,12})\b/i,
        /\bMRN-([A-Z0-9]{3,12})\b/i,
      ];

      for (const pattern of patterns) {
        const match = normalized.match(pattern);
        if (match && match[1]) {
          const code = match[1].replace(/\s+/g, '');
          if (/^[A-Z0-9]{3,12}$/.test(code) && !excludeWords.test(code)) {
            return `MRN-${code}`;
          }
        }
      }

      return null;
    }

    function detectMRNFromText(text) {
      if (!text || typeof text !== 'string') return null;

      const excludeWords = /^(NUMBER|IS|MRN|PATIENT|ID|MEDICAL|RECORD|THE|A|AN)$/i;

      const variations = [
        /\bMRN\s+NUMBER\s+IS\s+MRN\s+([A-Z0-9]{3,12})\b/i,
        /\bMEDICAL\s+RECORD\s+NUMBER\s+IS\s+([A-Z0-9]{3,12})\b/i,
        /\bMRN\s+NUMBER\s+IS\s+([A-Z0-9]{3,12})\b/i,
        /\bPATIENT\s+ID\s+IS\s+MRN\s+([A-Z0-9]{3,12})\b/i,
        /\bMRN\s+IS\s+([A-Z0-9]{3,12})\b/i,
        /\bMRN-([A-Z0-9]{3,12})\b/i,
        /\bMRN\s+([A-Z0-9]{3,12})\b/i,
        /\bM\s+R\s+N\s+([A-Z0-9]{3,12})\b/i,
      ];

      for (const pattern of variations) {
        const match = text.match(pattern);
        if (match && match[1]) {
          const code = match[1].trim().toUpperCase();
          if (/^[A-Z0-9]{3,12}$/.test(code) && !excludeWords.test(code)) {
            return `MRN-${code}`;
          }
        }
      }

      const normalized = normalizeMRN(text);
      if (normalized) return normalized;

      return null;
    }

    function testSingle() {
      const input = document.getElementById('testInput').value;
      const result = detectMRNFromText(input);
      const resultDiv = document.getElementById('singleResult');

      if (result) {
        resultDiv.innerHTML = `<div class="result success">Detected: ${result}</div>`;
      } else {
        resultDiv.innerHTML = `<div class="result error">No valid MRN detected</div>`;
      }
    }

    function runAllTests() {
      const testCases = [
        { input: 'MRN-AB123', expected: 'MRN-AB123', description: 'Standard format' },
        { input: 'MRN AB123', expected: 'MRN-AB123', description: 'Space instead of hyphen' },
        { input: 'M R N AB123', expected: 'MRN-AB123', description: 'Spaced letters' },
        { input: 'MRN - AB123', expected: 'MRN-AB123', description: 'Spaced hyphen' },
        { input: 'MRN dash AB123', expected: 'MRN-AB123', description: 'Spoken "dash"' },
        { input: 'MRN hyphen AB123', expected: 'MRN-AB123', description: 'Spoken "hyphen"' },
        { input: 'mrn ab123', expected: 'MRN-AB123', description: 'Lowercase' },
        { input: 'MRN-ABA121', expected: 'MRN-ABA121', description: 'Mixed alphanumeric' },
        { input: 'MRN-0001ABC', expected: 'MRN-0001ABC', description: 'Leading zeros' },
        { input: 'MRN-0178HGR', expected: 'MRN-0178HGR', description: 'Numbers and letters' },
        { input: 'Patient MRN AB123 presenting', expected: 'MRN-AB123', description: 'MRN in sentence' },
        { input: 'M R N - AB123', expected: 'MRN-AB123', description: 'Fully spaced' },
        { input: 'mrn dash ab123', expected: 'MRN-AB123', description: 'All lowercase with dash' },
        { input: 'MRN  AB123', expected: 'MRN-AB123', description: 'Multiple spaces' },
        { input: 'My patient MRN number is MRN AB123', expected: 'MRN-AB123', description: 'Real-world: MRN number is MRN AB123' },
        { input: 'MRN number is AB123', expected: 'MRN-AB123', description: 'MRN number is format' },
        { input: 'Patient ID is MRN XYZ789', expected: 'MRN-XYZ789', description: 'Patient ID is MRN format' },
        { input: 'Medical record number is AB123', expected: 'MRN-AB123', description: 'Medical record number format' },
        { input: 'MR-AB123', expected: null, description: 'Invalid prefix (should fail)' },
        { input: 'MRN-AB', expected: null, description: 'Too short (should fail)' },
        { input: 'MRN-ABCDEFGHIJKLM', expected: null, description: 'Too long (should fail)' },
        { input: 'MRN AB@123', expected: null, description: 'Special characters (should fail)' },
        { input: 'No MRN here', expected: null, description: 'No MRN (should fail)' },
        { input: 'MRN-XYZ789', expected: 'MRN-XYZ789', description: 'Letters then numbers' },
      ];

      let passed = 0;
      let failed = 0;
      let resultsHTML = '';

      testCases.forEach((test, idx) => {
        const result = detectMRNFromText(test.input);
        const success = result === test.expected;

        if (success) {
          passed++;
        } else {
          failed++;
        }

        resultsHTML += `
          <div class="test-case">
            <div class="test-input">Input: "${test.input}" - ${test.description}</div>
            <div class="test-output ${success ? '' : 'fail'}">
              Result: ${result || 'null'} ${success ? '✓' : '✗ Expected: ' + (test.expected || 'null')}
            </div>
          </div>
        `;
      });

      document.getElementById('batchResults').innerHTML = resultsHTML;
      document.getElementById('totalTests').textContent = testCases.length;
      document.getElementById('passedTests').textContent = passed;
      document.getElementById('failedTests').textContent = failed;
      document.getElementById('stats').style.display = 'flex';
    }

    function testTranscript() {
      const transcript = document.getElementById('transcriptInput').value;
      const lines = transcript.split('\n').filter(l => l.trim());

      let resultsHTML = '<div style="margin-top: 20px;">';
      let detectedMRNs = [];

      lines.forEach((line, idx) => {
        const mrn = detectMRNFromText(line);
        resultsHTML += `
          <div class="test-case">
            <div class="test-input">Line ${idx + 1}: "${line}"</div>
            <div class="test-output ${mrn ? '' : 'fail'}">
              ${mrn ? 'Detected: ' + mrn : 'No MRN detected'}
            </div>
          </div>
        `;
        if (mrn && !detectedMRNs.includes(mrn)) {
          detectedMRNs.push(mrn);
        }
      });

      resultsHTML += '</div>';

      if (detectedMRNs.length > 0) {
        resultsHTML += `
          <div class="result success" style="margin-top: 20px;">
            <strong>Unique MRNs detected:</strong> ${detectedMRNs.join(', ')}
          </div>
        `;
      } else {
        resultsHTML += `
          <div class="result error" style="margin-top: 20px;">
            No MRNs detected in transcript
          </div>
        `;
      }

      document.getElementById('transcriptResult').innerHTML = resultsHTML;
    }

    document.getElementById('testInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') testSingle();
    });
  </script>
</body>
</html>
