<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>XR Vision (Web Device)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />


    <!-- Device-only PWA -->
    <link rel="manifest" href="/device.webmanifest">
    <link rel="icon" href="/public/images/xr-logo-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/public/images/xr-logo-192.png" />
    <!-- Styles -->
    <link rel="stylesheet" href="/public/css/common.css" />
    <link rel="stylesheet" href="/public/css/device.css" />
    <link rel="stylesheet" href="/public/css/device-orb.css" />
</head>

<body>
    <div class="container orb-mode">
        <!-- Header -->
        <header class="header">
            <h1>XR Vision</h1>
            <div id="status" class="status status-disconnected">Status: Disconnected</div>
        </header>

        <!-- ORB UI -->
        <div class="orb-container">
            <!-- Orb Visual -->
            <div class="orb-visual" id="orbVisual">
                <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="orbGlow">
                            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
                        </radialGradient>
                        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#3b82f6" />
                            <stop offset="50%" style="stop-color:#8b5cf6" />
                            <stop offset="100%" style="stop-color:#3b82f6" />
                        </linearGradient>
                    </defs>
                    <circle cx="200" cy="200" r="180" fill="url(#orbGlow)" opacity="0.3"/>
                    <circle cx="200" cy="200" r="140" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>
                    <circle cx="200" cy="200" r="130" fill="#000" stroke="#3b82f6" stroke-width="2"/>
                    <path id="waveform" d="M 80 200 Q 120 180, 160 200 T 240 200 T 320 200" stroke="url(#waveGradient)" stroke-width="3" fill="none" opacity="0.8"/>
                </svg>
            </div>

            <!-- Response Card -->
            <div class="response-card" id="responseCard">
                <div class="response-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </div>
                <div class="response-text placeholder" id="responseText">Your XR assistant response appears here...</div>
            </div>
        </div>

        <!-- Mic Controls -->
        <div class="mic-controls">
            <button class="mic-button" id="micButton" aria-label="Voice Control">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="micGlow">
                            <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
                            <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="url(#micGlow)" opacity="0.4"/>
                    <circle cx="50" cy="50" r="35" fill="none" stroke="#8b5cf6" stroke-width="2"/>
                    <rect x="43" y="30" width="14" height="20" rx="7" fill="#8b5cf6"/>
                    <path d="M 35 45 Q 35 60, 50 60 Q 65 60, 65 45" stroke="#8b5cf6" stroke-width="2" fill="none"/>
                    <line x1="50" y1="60" x2="50" y2="70" stroke="#8b5cf6" stroke-width="2"/>
                    <line x1="42" y1="70" x2="58" y2="70" stroke="#8b5cf6" stroke-width="2"/>
                </svg>
            </button>
            <div class="mic-instruction" id="micInstruction">Hold to Speak</div>
            <button class="toggle-autonomous" id="toggleAutonomous" aria-label="Toggle Autonomous Mode">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
            </button>
        </div>

        <!-- Last heard voice chip (hidden but functional) -->
        <div id="chipLastCmd" class="chip" hidden>Heard: …</div>

        <!-- Controls (hidden but functional) -->
        <section class="card controls">

            <!-- XR Device ID input (similar to Dock "Enter the ID") -->
            <div class="controls-row">
                <input id="deviceXrIdInput" class="input" placeholder="Enter Device XR ID (e.g. 1234)" />
            </div>
            <div class="controls-row">
                <button id="btnConnect" class="chip-btn">Connect</button>
                <button id="btnStream" class="chip-btn">Start Stream</button>
                <button id="btnMute" class="chip-btn">Mute</button>
                <button id="btnVideo" class="chip-btn">Hide Video</button>
                <button id="btnVoice" class="chip-btn">Start Voice</button>
                <button id="btnAudio" class="chip-btn" disabled style="opacity: 0.5; cursor: not-allowed;">Audio</button>
            </div>
            <div class="controls-row">
                <button id="btnStartRec" class="btn-outline">Start Recording</button>
                <button id="btnStopRec" class="btn-outline">Stop Recording</button>
            </div>
        </section>

        <!-- Preview -->
        <section class="card preview">
            <video id="preview" autoplay playsinline webkit-playsinline muted></video>

            <div id="noStream" class="preview-empty" hidden>Stream not ready</div>
        </section>

        <!-- Messages -->
        <section class="messages card">
            <h2>Messages</h2>
            <div id="msgList" class="msg-list"></div>
        </section>

        <!-- Composer -->
        <section class="composer">
            <input id="msgInput" class="input" placeholder="Type a message…" />
            <label class="urgent">
                <input id="chkUrgent" type="checkbox" />
                <span>Urgent</span>
            </label>
            <button id="btnSend" class="btn-send">Send</button>
        </section>
    </div>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- XR config (must load before app modules) -->
    <script src="/public/js/config.js"></script>
    <!-- Autonomous mode modules -->
    <script src="/public/js/wake-word-detector.js"></script>
    <script src="/public/js/text-to-speech.js"></script>
    <script src="/public/js/autonomous-mode.js"></script>
    <!-- App logic -->
    <script type="module" src="/public/js/ui.js"></script>


    <!-- Service worker registration -->
    <script>
        // Robust SW registration: skip localhost and check for 404
        async function maybeRegisterSW() {
            // Check if service worker is supported
            if (!('serviceWorker' in navigator)) {
                console.log('[SW] Service Worker not supported in this browser');
                return;
            }

            // Skip registration on localhost
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                console.log('[SW] Skipping registration on localhost');
                return;
            }

            // Only register on /device pages
            if (!location.pathname.startsWith('/device')) {
                return;
            }

            try {
                // Check if sw.js exists before attempting registration
                const response = await fetch('/device/sw.js', { method: 'HEAD' });
                if (response.status !== 200) {
                    console.log(`[SW] Service worker script not found (${response.status})`);
                    return;
                }

                // All checks passed - register the service worker
                const registration = await navigator.serviceWorker.register('/device/sw.js', { scope: '/device/' });
                console.log('[SW] Registered successfully', registration.scope);
            } catch (err) {
                console.warn('[SW] Registration failed:', err.message);
            }
        }

        // Register on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeRegisterSW);
        } else {
            maybeRegisterSW();
        }

        // Optional: show a custom "Install" button if you add one with [data-install]
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.querySelector('[data-install]');
            if (btn) btn.style.display = 'inline-flex';
        });
        document.querySelector('[data-install]')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        });
    </script>

</body>

</html>
