<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>XR Vision (Web Device)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />


    <!-- Device-only PWA -->
    <link rel="manifest" href="/device.webmanifest">
    <link rel="icon" href="/public/images/xr-logo-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/public/images/xr-logo-192.png" />
    <!-- Styles -->
    <link rel="stylesheet" href="/public/css/common.css" />
    <link rel="stylesheet" href="/public/css/device.css" />
</head>

<body>
    <div class="voice-interface">
        <!-- Header with logo and status -->
        <header class="voice-header">
            <img src="/public/images/xr-logo.png" alt="XR Vision" class="voice-logo" />
            <div id="status" class="voice-status status-disconnected">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </header>

        <!-- Hidden controls for functionality (accessible via voice) -->
        <div class="hidden-controls">
            <input id="deviceXrIdInput" type="text" />
            <button id="btnConnect"></button>
            <button id="btnStream"></button>
            <button id="btnMute"></button>
            <button id="btnVideo"></button>
            <button id="btnVoice"></button>
            <button id="btnAudio"></button>
            <button id="btnStartRec"></button>
            <button id="btnStopRec"></button>
            <video id="preview" autoplay playsinline webkit-playsinline muted style="display:none;"></video>
            <div id="noStream" hidden></div>
        </div>

        <!-- Main voice orb with waveform -->
        <div class="voice-orb-container">
            <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
            <div class="voice-orb">
                <div class="orb-glow"></div>
                <div class="orb-ring"></div>
                <svg class="waveform-svg" viewBox="0 0 200 200">
                    <path id="waveformPath" d="" fill="none" stroke="url(#waveGradient)" stroke-width="2"/>
                    <defs>
                        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#0080ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <!-- Response area -->
        <div class="voice-response">
            <div class="response-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" opacity="0.5"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div id="responseText" class="response-text">Your XR assistant response appears here...</div>
        </div>

        <!-- Last heard command chip -->
        <div id="chipLastCmd" class="voice-chip" hidden></div>

        <!-- Microphone button -->
        <div class="voice-mic-container">
            <button id="micButton" class="voice-mic-button">
                <div class="mic-button-glow"></div>
                <svg class="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <path d="M12 1C10.34 1 9 2.34 9 4V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V4C15 2.34 13.66 1 12 1Z" fill="currentColor"/>
                    <path d="M19 10V12C19 15.87 15.87 19 12 19C8.13 19 5 15.87 5 12V10H7V12C7 14.76 9.24 17 12 17C14.76 17 17 14.76 17 12V10H19Z" fill="currentColor"/>
                    <path d="M11 21H13V23H11V21Z" fill="currentColor"/>
                    <path d="M8 23H16V24H8V23Z" fill="currentColor"/>
                </svg>
            </button>
            <div class="voice-mic-label">Hold to Speak</div>
        </div>

        <!-- Hidden messages section (accessible programmatically) -->
        <div class="hidden-messages">
            <div id="msgList"></div>
            <input id="msgInput" type="text" />
            <input id="chkUrgent" type="checkbox" />
            <button id="btnSend"></button>
        </div>
    </div>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- XR config (must load before app modules) -->
    <script src="/public/js/config.js"></script>
    <!-- Voice UI enhancements -->
    <script type="module" src="/public/js/voice-ui.js"></script>
    <!-- App logic -->
    <script type="module" src="/public/js/ui.js"></script>


    <!-- Service worker registration -->
    <script>
        // Robust SW registration: skip localhost and check for 404
        async function maybeRegisterSW() {
            // Check if service worker is supported
            if (!('serviceWorker' in navigator)) {
                console.log('[SW] Service Worker not supported in this browser');
                return;
            }

            // Skip registration on localhost
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                console.log('[SW] Skipping registration on localhost');
                return;
            }

            // Only register on /device pages
            if (!location.pathname.startsWith('/device')) {
                return;
            }

            try {
                // Check if sw.js exists before attempting registration
                const response = await fetch('/device/sw.js', { method: 'HEAD' });
                if (response.status !== 200) {
                    console.log(`[SW] Service worker script not found (${response.status})`);
                    return;
                }

                // All checks passed - register the service worker
                const registration = await navigator.serviceWorker.register('/device/sw.js', { scope: '/device/' });
                console.log('[SW] Registered successfully', registration.scope);
            } catch (err) {
                console.warn('[SW] Registration failed:', err.message);
            }
        }

        // Register on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeRegisterSW);
        } else {
            maybeRegisterSW();
        }

        // Optional: show a custom "Install" button if you add one with [data-install]
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.querySelector('[data-install]');
            if (btn) btn.style.display = 'inline-flex';
        });
        document.querySelector('[data-install]')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
        });
    </script>

</body>

</html>
